# slushy.trade-mcp — add inside the existing `server { listen 443 ... }` block
# for slushy.trade (alongside the SPA `/` and the `/api` → HyPaper routes).
# Reload nginx after adding: `sudo nginx -t && sudo systemctl reload nginx`.
#
# The MCP service listens on 127.0.0.1:8788. Exact-match locations + a
# bare proxy_pass (no URI) keep the request path intact.

# Streamable HTTP MCP transport. The GET stream is long-lived SSE, so buffering
# MUST be off and timeouts long, or notifications/subscriptions stall.
location = /mcp {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
}

# Chart screenshot push — raw image up to 8 MB.
location = /chart {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    client_max_body_size 8m;
}

# Chart drawings push + AI-authored drawings poll.
location = /drawings {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location = /agent-drawings {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
