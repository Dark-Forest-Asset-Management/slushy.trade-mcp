# slushy.trade-mcp — add inside the existing `server { listen 443 ... }` block
# for slushy.trade (alongside the SPA `/` and the `/api` → HyPaper routes).
# Reload nginx after adding: `sudo nginx -t && sudo systemctl reload nginx`.
#
# The MCP service listens on 127.0.0.1:8788. Exact-match locations + a
# bare proxy_pass (no URI) keep the request path intact.

# Streamable HTTP MCP transport. The GET stream is long-lived SSE, so buffering
# MUST be off and timeouts long, or notifications/subscriptions stall.
location = /mcp {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
}

# In-UI AI chat (BYO key). Streams SSE token-by-token, so — like /mcp —
# buffering MUST be off and the read timeout long or the stream stalls.
location = /chat {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
}

# Chart screenshot push — raw image up to 8 MB.
location = /chart {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    client_max_body_size 8m;
}

# Chart drawings push + AI-authored drawings poll.
location = /drawings {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location = /agent-drawings {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# OAuth 2.1 (ChatGPT app + one-click Claude Desktop). Discovery + the
# authorize/token/register endpoints proxy to the MCP service. These outrank
# the SPA `location /`: exact `=` matches always win, and `/oauth/` is a longer
# prefix than `/`. (The consent SCREEN itself is the SPA at /?mcp_authorize=… —
# not proxied here.)
location = /.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location = /.well-known/oauth-protected-resource/mcp {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location = /.well-known/oauth-authorization-server {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location = /.well-known/oauth-authorization-server/mcp {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location = /.well-known/openid-configuration {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
location /oauth/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
